name: Daily KAPT Scraper to Google Sheets

on:
  push:
    branches:
      - main
  schedule:
    # 매일 평일(월-금) 아침 8시 (한국시간 기준 UTC 23:00 전일)
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client curl_cffi

      - name: Create Google Service Account Secret File
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          # Secrets에서 가져온 인증 정보를 json 파일로 임시 저장합니다.
          echo "$GCP_SERVICE_ACCOUNT_JSON" > client_secret.json

      - name: Network Test (KG2B vs KAPT)
        run: |
          echo "=== 인터넷 접속 (내 IP 확인) ==="
          curl -s https://ifconfig.me || echo "IP 확인 실패"
          echo "\n\n=== KAPT 연결 테스트 ==="
          curl -s -o /dev/null -w "KAPT: HTTP %{http_code}, 소요시간 %{time_total}s\n" --connect-timeout 10 https://www.k-apt.go.kr/ || echo "KAPT 연결 실패"
          echo "=== KG2B 연결 테스트 ==="
          curl -s -o /dev/null -w "KG2B: HTTP %{http_code}, 소요시간 %{time_total}s\n" --connect-timeout 10 https://www.kg2b.com/ || echo "KG2B 연결 실패 (IP 차단 의심)"
          echo "=== KG2B 포트 연결 테스트 ==="
          timeout 10 bash -c '</dev/tcp/www.kg2b.com/443' 2>/dev/null && echo "포트 443 연결 성공" || echo "포트 443 연결 불가 (IP 차단 확실)"

      - name: Run KAPT Scraper
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        working-directory: ./code
        run: |
          python main.py

      - name: Cleanup
        if: always()
        run: |
          # 보안 상의 이유로 json 키 파일을 작업 완료 후 삭제
          rm -f client_secret.json
